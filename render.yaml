# Render Blueprint — Deploys the entire Trello SaaS stack
# https://render.com/docs/blueprint-spec

services:
  # =====================
  # PostgreSQL Database
  # =====================
  - type: postgresql
    name: trello-db
    database: trello_saas
    user: trello_user
    plan: free
    postgresMajorVersion: 16

  # =====================
  # Backend — Node.js Web Service
  # =====================
  - type: web
    name: trello-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: trello-db
          property: connectionString
      - key: CLIENT_URL
        fromService:
          name: trello-frontend
          type: static site
          property: url
      - key: STRIPE_SECRET_KEY
        value: "" # Optional — set manually if using Stripe
      - key: STRIPE_WEBHOOK_SECRET
        value: "" # Optional — set manually if using Stripe
      - key: CORS_ORIGIN
        fromService:
          name: trello-frontend
          type: static site
          property: url

  # =====================
  # Frontend — Static Site
  # =====================
  - type: static site
    name: trello-frontend
    env: static
    buildCommand: cd Frontend && npm install && npm run build
    staticPublishPath: Frontend/dist
    # SPA fallback — redirect all routes to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: trello-backend
          type: web
          property: url
          path: /api